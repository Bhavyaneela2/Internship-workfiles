{% extends 'portal_layout.html' %}

{% block content %}
<div class="max-w-lg mx-auto text-center">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <div class="text-5xl mb-4">⚠️</div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">{{ page_title }}</h2>
        <p class="text-gray-500 mb-6">
            Are you sure you want to delete <strong class="text-red-600">"{{ object }}"</strong>? This action cannot be
            undone.
        </p>
        <div class="flex justify-center space-x-4">
            <a href="{% url back_url %}"
                class="px-6 py-2.5 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm transition">
                Cancel
            </a>
            <form method="POST">
                {% csrf_token %}
                <button type="submit"
                    class="bg-red-600 text-white px-6 py-2.5 rounded-lg font-bold text-sm hover:bg-red-700 transition shadow-md">
                    Yes, Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
